body,html {

.hidden { display:none; }
.container { width:90%; max-width:600px; text-align:center; }
button { cursor:pointer; }
h1 { font-size: var(--h1); margin:.5rem 0; }
.card { background: var(--card); border-radius:20px; padding:1.5rem; box-shadow:0 4px 8px rgba(0,0,0,.1); }
.btn { display:inline-block; margin:.5rem; padding:.8rem 1.2rem; border:none; border-radius:12px;

.btn:hover { transform:scale(1.05); }
.btn:active { transform:scale(.95); }
#intro .btn {
  color:#111;
  font-family: Arial, sans-serif;
  font-weight:600;
  text-decoration:none;
}
.level-btn { width:3rem;height:3rem;line-height:3rem;font-size:1.2rem;background:var(--secondary); color:#333; }
.toggle { margin:.5rem; }
#mascot { width:120px;height:120px;margin:auto; }
@keyframes bounce { 0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)} }
@keyframes wiggle { 0%{transform:rotate(0)}25%{transform:rotate(5deg)}75%{transform:rotate(-5deg)}100%{transform:rotate(0)} }
@keyframes confetti { 0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(200px)} }
.confetti-piece { position:absolute; width:6px;height:12px; background:#ff6f61; animation:confetti .8s linear; }
.scoreboard { display:flex; justify-content:space-around; margin:.5rem 0; }
.sound-toggle { position:absolute; top:10px; right:10px; font-size:1.5rem; cursor:pointer; }

/* celebration overlay */
#treasureOverlay{
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.6);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  color:#fff; font-size:2rem; z-index:1000; pointer-events:none;
  opacity:0; transition:opacity .3s;
}
#treasureOverlay.show { opacity:1; pointer-events:auto; }
#walkAnim{
  position:absolute; bottom:20px; left:-10%;
  font-size:2rem; animation:walk 1.5s linear;
}
@keyframes walk { to{left:110%;} }

</style>

// expand to 25 per level - now base has 25 each, so no need to expand, but keep for consistency
const qBank = {};
for(let lvl=1;lvl<=6;lvl++){
  const b = base[lvl];
  qBank[lvl]=[];
  for(let i=0;i<25;i++){
    const item = Object.assign({}, b[i % b.length]);
    item.q = item.q + (i< b.length ? "" : ` (${i+1})`);
    qBank[lvl].push(item);
  }
}

let selectedLevel=1, silly=false;
let questions=[], current=0, score=0, streak=0, timer=0, timerId;

const levelSelect = document.getElementById('levelSelect');
for(let i=1;i<=6;i++){
  const btn=document.createElement('button');
  btn.textContent="P"+i;
  btn.className="level-btn";
  btn.onclick=()=>{ selectedLevel=i; [...levelSelect.children].forEach(b=>b.style.out=""); btn.style.out="2px solid #000"; };
  if(i===1) btn.style.out="2px solid #000";
  levelSelect.appendChild(btn);
}
document.getElementById('sillyMode').onchange=e=>silly=e.target.checked;
const startIntroBtn = document.getElementById('startIntroBtn');
if (startIntroBtn) startIntroBtn.onclick=()=>showScreen('home');
document.getElementById('startBtn').onclick=startGame;
document.getElementById('nextBtn').onclick=nextQuestion;
document.getElementById('playAgain').onclick=()=>location.reload();
document.addEventListener('keydown',e=>{
  if(gameOn && e.key>="1" && e.key<="4"){
    const idx=+e.key-1;
    document.querySelectorAll('#answers button')[idx]?.click();
  }
});
// show intro on load
window.addEventListener('load', ()=>{
  // nothing needed here anymore
});

function startGame(){
  questions = shuffle(qBank[selectedLevel]).slice(0,10).map(q => ({...q}));
  current=0; score=0; streak=0;
  showScreen('game');
  loadQuestion();
}

function loadQuestion(){
  clearInterval(timerId);
  if(current>=questions.length){ endGame(); return; }
  const q=questions[current];
  showMascot('thinking');
  document.getElementById('progress').textContent=`Question ${current+1}/${questions.length}`;
  document.getElementById('questionCard').textContent= silly ? q.q+" !!" : q.q;
  const ansDiv=document.getElementById('answers');
  ansDiv.innerHTML="";
  q.choices.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className="btn";
    b.textContent=silly?c+" !!":c;
    b.onclick=()=>checkAnswer(i);
    ansDiv.appendChild(b);
  });
  // timer
  timer = selectedLevel<=2?15:(selectedLevel<=4?18:20);
  document.getElementById('timer').textContent=timer;
  timerId=setInterval(()=>{
    timer--;
    document.getElementById('timer').textContent=timer;
    if(timer<=0){ clearInterval(timerId); checkAnswer(-1); }
  },1000);
  gameOn=true;
}

function checkAnswer(idx){
  clearInterval(timerId);
  gameOn=false;
  const q=questions[current];
  const correct = idx===q.answer;
  const fb=document.getElementById('fbText');
  fb.textContent = correct? "Correct!":"Oops!";
  document.getElementById('fbExplain').textContent=q.explain;
  if(correct){
    score+=10;
    streak++;
    showTreasure();
    if(streak>=3) showMascot('streak');
    else showMascot(Math.random()<.5?'correct_1':'correct_2');
    confetti();
  } else {
    streak=0;
    showMascot('wrong_1');
  }
  document.getElementById('score').textContent=score;
  document.getElementById('streak').textContent=streak;
  showScreen('feedback');
  setTimeout(nextQuestion,1200);
}

function nextQuestion(){
  current++;
  showScreen('game');
  loadQuestion();
}

function endGame(){
  showMascot('idle');
  clearInterval(timerId);
  const acc = Math.round((score/(questions.length*10))*100);
  const bests = JSON.parse(localStorage.getItem('Ms.Kwek_best')||"{}");
  if(!bests[selectedLevel]||score>bests[selectedLevel]) bests[selectedLevel]=score;
  localStorage.setItem('Ms.Kwek_best',JSON.stringify(bests));
  document.getElementById('endStats').innerHTML=
    `Score: ${score}<br>Accuracy: ${acc}%<br>Best P${selectedLevel}: ${bests[selectedLevel]}`;
  showScreen('end');
}

function showScreen(id){
  ['intro','home','game','feedback','end'].forEach(s=>{
    const el=document.getElementById(s);
    if(el){ el.style.display='none'; el.classList.add('hidden'); }
  });
  const el=document.getElementById(id);
  if(el){ el.style.display=''; el.classList.remove('hidden'); }
}

function shuffle(a){
  const arr = [...a];
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function confetti(){
  for(let i=0;i<30;i++){
    const d=document.createElement('div');
    d.className='confetti-piece';
    d.style.left=Math.random()*100+'%';
    d.style.background=`hsl(${Math.random()*360},70%,60%)`;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),800);
  }
}

function showTreasure(){
  const t=document.getElementById('treasureOverlay');
  if(!t) return;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

let gameOn=false;
</script>
